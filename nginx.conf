# =============================================================================
# nginx.conf — APICenter Load Balancer  (checklist §2, §3, §8)
# =============================================================================
#
# ROLE IN THE SYSTEM:
#   NGINX is the SINGLE routing point that all consumers reach first.
#   It load-balances across 3 identical, interchangeable APICenter containers.
#
# REQUEST FLOW (checklist §4):
#   consumer (tribe SDK / browser / external client)
#     │
#     ▼  port 3000
#   NGINX  ←─── this file
#     │
#     ├─▶ api-center-1:3000
#     ├─▶ api-center-2:3000   (round-robin, default)
#     └─▶ api-center-3:3000
#
# ROUND-ROBIN (checklist §3):
#   NGINX's default upstream algorithm — no directive needed.
#   Each new request is forwarded to the next container in sequence.
#
# PASSIVE HEALTH CHECKS (checklist §3):
#   max_fails=3   — mark a container DOWN after 3 consecutive failures
#   fail_timeout=20s — keep it out of rotation for 20 s, then probe again
#   proxy_next_upstream — on failure, automatically retry on another container
#
# CORS AT NGINX LAYER (required):
#   OPTIONS preflight requests are answered directly by NGINX.
#   This prevents preflight from consuming a Node worker and adds no latency.
#   The NestJS app (main.ts) has a matching enableCors() call so direct
#   container access (local dev, CI, health checks) also works.
#
# STATELESS GUARANTEE (checklist §1, §8):
#   No sticky sessions — the gateway is fully stateless.
#   All session/token/registry state lives in Redis, shared by all containers.
#   Removing one container does NOT interrupt inflight requests.
# =============================================================================

worker_processes auto;

events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {

    # ── Upstream: 3 identical, interchangeable APICenter containers ───────────
    # Round-robin is the NGINX default — no extra directive needed.
    # max_fails / fail_timeout = passive health check (checklist §3).
    upstream api_center {
        server api-center-1:3000 max_fails=3 fail_timeout=20s;
        server api-center-2:3000 max_fails=3 fail_timeout=20s;
        server api-center-3:3000 max_fails=3 fail_timeout=20s;

        # Reuse TCP connections to containers (improves throughput)
        keepalive 32;
    }

    # ── Connection-level rate limiter ─────────────────────────────────────────
    # Protects all containers from burst traffic before it even reaches Node.
    # Per-IP, 10 MB zone, 200 req/s sustained (burst=100 allows short spikes).
    limit_req_zone $binary_remote_addr zone=gateway_rl:10m rate=200r/s;

    # ── Structured JSON access log ────────────────────────────────────────────
    log_format json_access escape=json
        '{"ts":"$time_iso8601",'
         '"method":"$request_method",'
         '"uri":"$request_uri",'
         '"status":$status,'
         '"upstream":"$upstream_addr",'
         '"req_time":$request_time,'
         '"upstream_time":"$upstream_response_time",'
         '"bytes_sent":$bytes_sent,'
         '"remote_addr":"$remote_addr",'
         '"correlation_id":"$http_x_correlation_id"}';

    access_log /var/log/nginx/access.log json_access;
    error_log  /var/log/nginx/error.log  warn;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;
    keepalive_timeout 65;

    gzip on;
    gzip_types application/json text/plain application/javascript text/css;
    gzip_min_length 1024;
    gzip_vary on;

    server {
        listen 80;
        server_name _;

        # ── NGINX self-health — no upstream hit ───────────────────────────────
        # Used by docker-compose healthcheck and external monitoring.
        location = /nginx-health {
            access_log off;
            return 200 '{"status":"ok","layer":"load-balancer","containers":3}';
            add_header Content-Type application/json;
        }

        # ── All other traffic ─────────────────────────────────────────────────
        location / {

            # ── CORS (checklist §8 — required) ────────────────────────────────
            # Preflight (OPTIONS) is answered here — never hits Node containers.
            # All other methods get the matching CORS response headers.
            # Settings mirror app.enableCors() in main.ts exactly.

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin'      "$http_origin"                                                        always;
                add_header 'Access-Control-Allow-Methods'     'GET, POST, PUT, PATCH, DELETE, OPTIONS'                              always;
                add_header 'Access-Control-Allow-Headers'     'Content-Type, Authorization, X-Correlation-ID, X-Platform-Secret, X-Tribe-Id' always;
                add_header 'Access-Control-Expose-Headers'    'X-Correlation-ID, Deprecation, Sunset, Link, Retry-After'            always;
                add_header 'Access-Control-Allow-Credentials' 'true'                                                                always;
                add_header 'Access-Control-Max-Age'           '86400'                                                               always;
                add_header 'Content-Length' '0';
                add_header 'Content-Type'   'text/plain; charset=utf-8';
                return 204;
            }

            # CORS headers on all non-preflight responses
            add_header 'Access-Control-Allow-Origin'      "$http_origin"                                                       always;
            add_header 'Access-Control-Allow-Credentials' 'true'                                                               always;
            add_header 'Access-Control-Expose-Headers'    'X-Correlation-ID, Deprecation, Sunset, Link, Retry-After'          always;

            # ── Rate limiting ─────────────────────────────────────────────────
            limit_req        zone=gateway_rl burst=100 nodelay;
            limit_req_status 429;

            # ── Proxy to upstream (round-robin across 3 containers) ───────────
            proxy_pass         http://api_center;
            proxy_http_version 1.1;
            proxy_set_header   Connection ''; # required for keepalive

            # Forward real client info so Node can log / trust them
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket upgrade (for future streaming endpoints)
            proxy_set_header Upgrade $http_upgrade;

            # ── Timeouts ──────────────────────────────────────────────────────
            proxy_connect_timeout 10s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;

            # ── Buffering ─────────────────────────────────────────────────────
            proxy_buffering         off;
            proxy_request_buffering off;

            # ── Retry on container failure (checklist §3 — auto re-add) ───────
            # On 502/503/504, NGINX silently tries the next container in rotation.
            # The failed container's fail counter increments (passive health check).
            proxy_next_upstream       error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 2;
            proxy_next_upstream_timeout 10s;
        }
    }
}
