# =============================================================================
# gcp/cloudrun.yaml — Cloud Run service definition for APICenter
# =============================================================================
# Deploy with:
#   gcloud run services replace gcp/cloudrun.yaml --region=REGION
#
# Replace every placeholder wrapped in < > before deploying:
#   <PROJECT_ID>        your GCP project ID
#   <REGION>            Cloud Run region, e.g. us-central1
#   <IMAGE>             full Artifact Registry path, e.g.
#                       us-central1-docker.pkg.dev/<PROJECT_ID>/api-center/api-center:latest
#   <SA_EMAIL>          Cloud Run service account email, e.g.
#                       api-center-cloudrun@<PROJECT_ID>.iam.gserviceaccount.com
#   <SECRET_NAME>       GCP Secret Manager secret name, e.g. api-center-prod
# =============================================================================

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: api-center
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        # Scale to 0 when idle to save cost; raise min-instances for prod latency
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "10"
        # Use the dedicated service account (not the Compute default SA)
        run.googleapis.com/service-account: <SA_EMAIL>
    spec:
      # Cloud Run enforces a 60 s startup timeout by default; raise if needed
      containerConcurrency: 80
      timeoutSeconds: 300
      serviceAccountName: <SA_EMAIL>
      containers:
        - image: <IMAGE>
          ports:
            - containerPort: 8080
          env:
            - name: NODE_ENV
              value: production
            - name: GCP_PROJECT_ID
              value: <PROJECT_ID>
            - name: GCP_SECRET_NAME
              value: <SECRET_NAME>
            # Override PORT so the app binds to what Cloud Run expects
            - name: PORT
              value: "8080"
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          # Liveness probe — Cloud Run restarts the container if this fails
          livenessProbe:
            httpGet:
              path: /api/v1/health/live
            initialDelaySeconds: 10
            periodSeconds: 15
          # Startup probe — give the app time to load secrets before traffic
          startupProbe:
            httpGet:
              path: /api/v1/health/ready
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
